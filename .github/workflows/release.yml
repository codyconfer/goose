name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate tag
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::'$TAG' is not a valid release tag (expected vMAJOR.MINOR.PATCH)." >&2
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag '$TAG' does not exist." >&2
            exit 1
          fi

      - name: Verify tag is on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$TAG^{commit}" origin/main; then
            echo "::error::Tag $TAG does not point to a commit on main; refusing to release." >&2
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install appimagetool
        run: |
          curl -fsSL -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool

      - name: Build release artifacts
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: make release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --generate-notes
